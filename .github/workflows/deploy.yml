name: Публикация на GitHub Pages

# Запускается при обновлении ветки main, а также вручную кнопкой в разделе Actions.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Права, нужные для публикации на Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Публикуем по одной за раз, не отменяя уже идущую.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Забрать код
        uses: actions/checkout@v4

      - name: Установить Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Установить зависимости
        run: npm ci

      - name: Собрать приложение
        run: npm run build

      - name: Настроить Pages
        uses: actions/configure-pages@v5

      - name: Загрузить собранные файлы
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Опубликовать
        id: deployment
        uses: actions/deploy-pages@v4
