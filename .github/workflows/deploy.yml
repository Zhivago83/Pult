# Автопубликация приложения на GitHub Pages.
# После каждого пуша в рабочую ветку собирает проект и выкладывает его,
# чтобы можно было открыть ссылку в Safari на айпаде.
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/pult-manager-app-4yk5st
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # Автоматически включает GitHub Pages для репозитория при первом запуске.
      - uses: actions/configure-pages@v5
      - run: npm ci
      # BASE=/Pult/ — приложение живёт по адресу https://<user>.github.io/Pult/
      - run: npm run build
        env:
          BASE: /Pult/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
